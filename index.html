<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="เว็บไซต์แสดงผลงานและทักษะ Tunwa">
  <title>TUNWA // PORTFOLIO</title>

  <style>
    /* ตั้งค่าธีมมืด (Dark Mode) และสีนีออน */
    :root {
      --bg-color: #0a0a12;
      --card-bg: #121225;
      --primary-neon: #00f0ff; /* ฟ้าอินฟินิตี้ */
      --secondary-neon: #ff007f; /* ชมพูไซเบอร์ */
      --text-color: #e0e0ff;
    }

    html {
      scroll-behavior: smooth;
      font-family: 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      padding-top: 70px;
      overflow-x: hidden;
    }

    /* แถบเมนูลอยแบบโปร่งแสง (Glassmorphism) */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(10, 10, 18, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 240, 255, 0.2);
      z-index: 1000;
    }

    .nav-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 18px;
    }

    .nav-container a {
      text-decoration: none;
      color: var(--text-color);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .nav-container a:hover {
      color: var(--primary-neon);
      text-shadow: 0 0 10px var(--primary-neon);
    }

    /* ส่วนหัวสุดอลังการ (Hero Section) */
    header {
      position: relative;
      text-align: center;
      padding: 150px 20px;
      background: radial-gradient(circle at center, #1a1a3a 0%, var(--bg-color) 70%);
      border-bottom: 2px dashed rgba(255, 0, 127, 0.3);
    }

    header h1 {
      margin: 0;
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: 4px;
      color: #fff;
      /* เอฟเฟกต์เรืองแสงสะใจ */
      text-shadow: 0 0 10px var(--primary-neon), 0 0 30px var(--primary-neon);
    }

    header p {
      font-size: 1.2rem;
      color: var(--secondary-neon);
      text-shadow: 0 0 8px var(--secondary-neon);
      margin-top: 15px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    /* การจัดหน้าเซกชัน */
    section {
      scroll-margin-top: 100px;
      padding: 80px 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    section h2 {
      font-size: 2rem;
      border-left: 5px solid var(--primary-neon);
      padding-left: 15px;
      margin-bottom: 40px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
    }

    /* กล่องผลงานแบบไซเบอร์บอร์ด */
    .project-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }

    @media (max-width: 768px) {
      .project-grid { grid-template-columns: 1fr; }
    }

    .project {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 4px;
      border: 1px solid rgba(255, 0, 127, 0.2);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .project::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      background: var(--secondary-neon);
    }

    .project:hover {
      transform: translateY(-5px);
      border-color: var(--primary-neon);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
    }

    .project h3 {
      margin-top: 0;
      color: #fff;
    }

    /* รายการทักษะ (Skills Tags) เปลี่ยนจากจุดธรรมดาเป็นชิปเรืองแสง */
    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 0;
      list-style: none;
    }

    .skills-list li {
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid var(--primary-neon);
      color: var(--primary-neon);
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
      letter-spacing: 1px;
      box-shadow: inset 0 0 5px rgba(0, 240, 255, 0.2);
    }

    /* ส่วนท้ายเว็บ */
    footer {
      background-color: #05050a;
      text-align: center;
      padding: 40px 20px;
      margin-top: 100px;
      border-top: 1px solid rgba(0, 240, 255, 0.2);
    }

    footer a {
      color: var(--secondary-neon);
      text-decoration: none;
      font-weight: bold;
    }

    footer a:hover {
      text-shadow: 0 0 8px var(--secondary-neon);
    }

    .fade-
